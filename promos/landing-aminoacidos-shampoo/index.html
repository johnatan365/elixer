<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-bright:#FFD700;--gold-dark:#8B6914;
  --black:#080808;--white:#fff;--wa:#25D366;--wa-dark:#1da851;
}
html{scroll-behavior:smooth;}
body{background:var(--black);font-family:'Helvetica Neue',Arial,sans-serif;color:var(--white);overflow-x:hidden;padding-bottom:80px;}

/* ── IMAGES ── */
.img-block{width:100%;display:flex;flex-direction:column;align-items:center;}
.img-block img{width:100%;max-width:600px;display:block;margin:0 auto;}

/* ── CTA BETWEEN SECTIONS ── */
.cta-block{width:100%;max-width:600px;margin:0 auto;padding:16px 16px 24px;}
.btn-cta-main{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:20px;border:none;border-radius:6px;cursor:pointer;
  font-size:16px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;
  font-family:inherit;text-decoration:none;transition:transform .2s,box-shadow .2s;
}
.btn-gold-cta{
  background:#ffffff !important;border:2px solid #C9A84C !important;color:#080808 !important;
  box-shadow:0 4px 20px rgba(201,168,76,.25);
}
.btn-gold-cta:hover{background:#fffdf5 !important;transform:translateY(-2px);box-shadow:0 6px 28px rgba(201,168,76,.4);}
@keyframes pulse-gold{0%,100%{box-shadow:0 4px 20px rgba(201,168,76,.25);}50%{box-shadow:0 4px 32px rgba(201,168,76,.5);}}

/* ── DIVIDER ── */
.divider{width:100%;max-width:600px;margin:0 auto;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ── STICKY FOOTER ── */
.sticky{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,8,.96);border-top:2px solid var(--gold);padding:12px 16px;display:flex;justify-content:center;}
.sticky a{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--wa),var(--wa-dark));
  color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;text-decoration:none;
  padding:14px 28px;border-radius:6px;width:100%;max-width:560px;
  animation:pulse-wa 2.5s ease infinite;
}
@keyframes pulse-wa{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4);}50%{box-shadow:0 4px 36px rgba(37,211,102,.8);}}
.sticky a svg{width:20px;height:20px;flex-shrink:0;}

/* ── MODAL OVERLAY ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-box{background:#111;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:0 0 32px;}
.modal-handle{width:40px;height:4px;background:#444;border-radius:4px;margin:12px auto 0;}
.modal-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:800;color:var(--gold);}
.modal-close{background:#222;border:none;color:#aaa;width:32px;height:32px;border-radius:999px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}

/* step indicator */
.steps-bar{display:flex;gap:8px;margin-bottom:20px;}
.step-dot{flex:1;height:4px;border-radius:4px;background:#333;transition:background .3s;}
.step-dot.active{background:var(--gold);}

/* ── PASO 1: PAQUETES ── */
.pack-img-wrap{display:flex;align-items:center;justify-content:center;gap:4px;height:80px;overflow:hidden;margin-bottom:10px;}
.pack-img-wrap img{height:100%;width:auto;object-fit:contain;}
.pack-cards{display:flex;flex-direction:column;gap:12px;}
.pack-card{
  border:2px solid #333;border-radius:12px;padding:16px;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
.pack-card:hover{border-color:var(--gold);background:rgba(201,168,76,.05);}
.pack-card.selected{border-color:var(--gold);background:rgba(201,168,76,.1);}
.pack-badge{position:absolute;top:-10px;right:12px;background:var(--gold);color:#000;font-size:10px;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.pack-name{font-size:15px;font-weight:800;color:var(--white);margin-bottom:4px;}
.pack-desc{font-size:12px;color:#aaa;margin-bottom:8px;}
.pack-price{font-size:22px;font-weight:900;color:var(--gold);}
.pack-envio{font-size:11px;color:#6b6;font-weight:700;margin-top:2px;}
.pack-check{position:absolute;top:16px;right:16px;width:24px;height:24px;border:2px solid #555;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.pack-card.selected .pack-check{background:var(--gold);border-color:var(--gold);color:#000;font-weight:900;}

/* ── PASO 2: ADDONS ── */
.addon-cards{display:flex;flex-direction:column;gap:10px;}
.addon-card{
  display:flex;gap:12px;align-items:center;border:2px solid #333;border-radius:12px;
  padding:12px;cursor:pointer;transition:border-color .2s,background .2s;
}
.addon-card:hover{border-color:var(--gold);background:rgba(201,168,76,.05);}
.addon-card.selected{border-color:var(--gold);background:rgba(201,168,76,.1);}
.addon-img{width:60px;height:60px;object-fit:contain;border-radius:8px;flex-shrink:0;}
.addon-info{flex:1;}
.addon-name{font-size:13px;font-weight:800;color:var(--white);}
.addon-why{font-size:11px;color:#aaa;margin-top:2px;line-height:1.4;}
.addon-price{font-size:14px;font-weight:800;color:var(--gold);margin-top:4px;}
.addon-chk{width:26px;height:26px;border:2px solid #555;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px;}
.addon-card.selected .addon-chk{background:var(--gold);border-color:var(--gold);color:#000;font-weight:900;}
.addon-skip{background:none;border:none;color:#666;font-size:13px;cursor:pointer;text-decoration:underline;width:100%;text-align:center;margin-top:8px;padding:8px;}

/* ── PASO 3: FORMULARIO ── */
.form-lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:6px;margin-top:14px;}
.form-inp{
  width:100%;background:#1a1a1a;border:1.5px solid #333;border-radius:8px;
  padding:12px 14px;font-size:14px;color:var(--white);font-family:inherit;outline:none;
  transition:border-color .2s;
}
.form-inp:focus{border-color:var(--gold);}
.order-summary{background:#1a1a1a;border:1.5px solid var(--gold-dark);border-radius:10px;padding:14px;margin:16px 0;}
.os-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:10px;}
.os-line{display:flex;justify-content:space-between;font-size:13px;color:#ccc;margin-bottom:6px;}
.os-total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;color:var(--gold);border-top:1px solid #333;padding-top:10px;margin-top:6px;}
.btn-submit{
  width:100%;padding:18px;background:linear-gradient(135deg,var(--gold),var(--gold-bright),var(--gold));
  background-size:200% auto;border:none;color:#000;font-size:16px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;border-radius:8px;cursor:pointer;
  font-family:inherit;margin-top:16px;transition:all .2s;
}
.btn-submit:hover{background-position:right center;transform:translateY(-2px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.form-err{color:#f87171;font-size:12px;margin-top:8px;display:none;}
.modal-nav{display:flex;gap:10px;margin-top:16px;}
.btn-back{flex:1;padding:14px;background:#222;border:none;color:#aaa;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;}
.btn-next{flex:2;padding:14px;background:var(--gold);border:none;color:#000;font-size:14px;font-weight:800;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-next:hover{background:var(--gold-bright);}
.btn-next:disabled{opacity:.5;cursor:not-allowed;}
</style>

<script>

const sb=createClient('https://jtjnzdbgelezdcdpipmv.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0am56ZGJnZWxlemRjZHBpcG12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MjAyODAsImV4cCI6MjA5MjM5NjI4MH0.nOqPWAjnX9nCYveL4zOjFKugdcSL0zOeWsDdr8X9rME');

// ── STATE ──
const packs=[
  {id:'amino1',name:'1 Aminoácido',desc:'1 Tratamiento Capilar 500ml',price:79000,badge:'',imgPos:'75% 15%',imgScale:'1.9'},
  {id:'kit_ritual',name:'Kit Ritual',desc:'1 Tratamiento + Shampoo Bomba de Frutas',price:117000,badge:'Más popular',imgPos:'20% 15%',imgScale:'1.9'},
  {id:'super_promo',name:'Super Promo',desc:'2 Aminoácidos + 1 Shampoo Gratis',price:158000,badge:'Mejor valor',imgPos:'20% 70%',imgScale:'1.9'},
];
const addonsData=[
  {id:'termico',name:'Gorro Térmico',why:'Potencia el tratamiento 3x con calor controlado',price:29500,img:'/promos/landing-aminoacidos-shampoo/addon_gorro_termico.webp'},
  {id:'satin',name:'Gorro de Satín',why:'Protege el cabello mientras duermes',price:10000,img:'/promos/landing-aminoacidos-shampoo/addon_gorro_satin.webp'},
  {id:'cepillo',name:'Cepillo Secador de Aguacate',why:'Seca y modela sellando el tratamiento en minutos',price:45000,img:'/promos/landing-aminoacidos-shampoo/addon_cepillo.webp'},
];
let selectedPack=null;
let selectedAddons={};
let currentStep=1;
let submitting=false;

// ── MODAL ──
function openModal(){
  selectedPack=null;selectedAddons={};currentStep=1;
  renderStep();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';

  const floatingBtn=document.querySelector('.floating-cta');
  if(floatingBtn){
    floatingBtn.style.display='none';
  }
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';

  const floatingBtn=document.querySelector('.floating-cta');
  if(floatingBtn){
    floatingBtn.style.display='flex';
  }
}

function renderStep(){
  const body=document.getElementById('modal-body');
  updateStepBar();
  if(currentStep===1) body.innerHTML=renderStep1();
  if(currentStep===2) body.innerHTML=renderStep2();
  if(currentStep===3) body.innerHTML=renderStep3();
}

function updateStepBar(){
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active', i<currentStep);
  });
  const titles=['Elige tu paquete','Complementos opcionales','Datos de entrega'];
  document.getElementById('modal-title').textContent=titles[currentStep-1];
}

// STEP 1
function renderStep1(){
  const packImgs={
    amino1:['/Envase Aminoacido 500 gr sin fondo.webp'],
    kit_ritual:['/Envase Aminoacido 500 gr sin fondo.webp','/Shampoo Fondo Transparente 500 gr.webp'],
    super_promo:['/Envase Aminoacido 500 gr sin fondo.webp','/Envase Aminoacido 500 gr sin fondo.webp','/Shampoo Fondo Transparente 500 gr.webp']
  };
  return `<div class="pack-cards">${packs.map(p=>`
    <div class="pack-card${selectedPack===p.id?' selected':''}" onclick="selectPack('${p.id}')">
      ${p.badge?`<div class="pack-badge">${p.badge}</div>`:''}
      <div class="pack-check">${selectedPack===p.id?'✓':''}</div>
      <div class="pack-img-wrap">
        ${packImgs[p.id].map(src=>`<img src="${src}" alt="${p.name}" loading="lazy"/>`).join('')}
      </div>
      <div class="pack-name">${p.name}</div>
      <div class="pack-desc">${p.desc}</div>
      <div class="pack-price">$${p.price.toLocaleString('es-CO')}</div>
      <div class="pack-envio">✓ Envío gratis a toda Colombia • Pago contraentrega</div>
    </div>`).join('')}
  </div>
  <div class="modal-nav">
    <button class="btn-next" id="btn-next1" onclick="goStep2()" ${!selectedPack?'disabled':''} style="flex:1;">Continuar →</button>
  </div>`;
}

function selectPack(id){
  selectedPack=id;
  renderStep();
}

function goStep2(){
  if(!selectedPack)return;
  currentStep=2;renderStep();
}

// STEP 2
function renderStep2(){
  return `
  <div style="background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border:1.5px solid var(--gold-dark);border-radius:10px;padding:14px;margin-bottom:16px;text-align:center;">
    <div style="font-size:15px;margin-bottom:6px;">🌟</div>
    <div style="font-size:14px;font-weight:800;color:var(--gold);margin-bottom:4px;">¡Potencia tus resultados al máximo!</div>
    <div style="font-size:12px;color:#bbb;line-height:1.6;">Estos complementos están diseñados para multiplicar el efecto de tu tratamiento. El <strong style="color:#fff;">Gorro Térmico</strong> activa los aminoácidos con calor, el <strong style="color:#fff;">Gorro de Satín</strong> protege el tratamiento mientras duermes y el <strong style="color:#fff;">Cepillo de Aguacate</strong> sella todo con un acabado profesional.</div>
  </div>
  <div class="addon-cards">${addonsData.map(a=>`
    <div class="addon-card${selectedAddons[a.id]?' selected':''}" onclick="toggleAddon('${a.id}')">
      <img class="addon-img" src="${a.img}" alt="${a.name}"/>
      <div class="addon-info">
        <div class="addon-name">${a.name}</div>
        <div class="addon-why">${a.why}</div>
        <div class="addon-price">+ $${a.price.toLocaleString('es-CO')}</div>
      </div>
      <div class="addon-chk">${selectedAddons[a.id]?'✓':''}</div>
    </div>`).join('')}
  </div>
  <div class="modal-nav">
    <button class="btn-back" onclick="goBack()">← Atrás</button>
    <button class="btn-next" onclick="goStep3()">Continuar →</button>
  </div>`;
}

function toggleAddon(id){
  selectedAddons[id]=!selectedAddons[id];
  renderStep();
}

function goStep3(){currentStep=3;renderStep();}
function goBack(){currentStep--;renderStep();}

// STEP 3
function renderStep3(){
  const pack=packs.find(p=>p.id===selectedPack);
  let total=pack.price;
  let lines=`<div class="os-line"><span>${pack.name}</span><span>$${pack.price.toLocaleString('es-CO')}</span></div>`;
  addonsData.forEach(a=>{
    if(selectedAddons[a.id]){
      total+=a.price;
      lines+=`<div class="os-line"><span>${a.name}</span><span>+$${a.price.toLocaleString('es-CO')}</span></div>`;
    }
  });
  return `
  <div class="order-summary">
    <div class="os-title">Resumen de tu pedido</div>
    ${lines}
    <div class="os-total"><span>Total contraentrega</span><span>$${total.toLocaleString('es-CO')}</span></div>
  </div>
  <label class="form-lbl">Nombre completo *</label>
  <input id="f-name" class="form-inp" type="text" placeholder="Tu nombre y apellido"/>
  <label class="form-lbl">Teléfono / WhatsApp *</label>
  <input id="f-phone" class="form-inp" type="tel" placeholder="3XX XXX XXXX"/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div>
      <label class="form-lbl">Ciudad *</label>
      <input id="f-city" class="form-inp" type="text" placeholder="Tu ciudad"/>
    </div>
    <div>
      <label class="form-lbl">Departamento *</label>
      <input id="f-depto" class="form-inp" type="text" placeholder="Antioquia"/>
    </div>
  </div>
  <label class="form-lbl">Dirección de entrega *</label>
  <input id="f-address" class="form-inp" type="text" placeholder="Calle, barrio, número de casa..."/>
  <label class="form-lbl">Nota (opcional)</label>
  <input id="f-note" class="form-inp" type="text" placeholder="Instrucciones especiales..."/>
  <div class="form-err" id="form-err">Por favor completa todos los campos obligatorios.</div>
  <div class="modal-nav">
    <button class="btn-back" onclick="goBack()">← Atrás</button>
    <button class="btn-next" id="btn-submit" onclick="submitOrder()">Confirmar pedido</button>
  </div>`;
}

async function submitOrder(){
  if(submitting)return;
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const city=document.getElementById('f-city').value.trim();
  const depto=document.getElementById('f-depto').value.trim();
  const address=document.getElementById('f-address').value.trim();
  const note=document.getElementById('f-note')?.value.trim()||'';
  const err=document.getElementById('form-err');

  if(!name||!phone||!city||!depto||!address){
    err.style.display='block';return;
  }
  err.style.display='none';

  const pack=packs.find(p=>p.id===selectedPack);
  let total=pack.price;
  const products=[{name:pack.name,qty:1,price:pack.price}];
  addonsData.forEach(a=>{
    if(selectedAddons[a.id]){
      total+=a.price;
      products.push({name:a.name,qty:1,price:a.price});
    }
  });

  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='Enviando...';
  submitting=true;

  const {error}=await sb.from('orders').insert([{
    customer_name:name,
    customer_phone:phone,
    customer_city:city+', '+depto,
    customer_address:address,
    products:products,
    total_cop:total,
    status:'pendiente',
    notes:note||null,
    source:'promo_amino_shampoo'
  }]);

  submitting=false;
  if(error){
    btn.disabled=false;btn.textContent='Confirmar pedido';
    err.textContent='Error: '+(error.message||'Intenta de nuevo.');
    err.style.display='block';
    console.error('Supabase error:',error);
    return;
  }

  // Redirigir a gracias — el píxel solo se dispara allá
  // Coincidencias avanzadas — hashear teléfono y nombre para Meta
  async function sha256(str){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  try{
    let cleanPhone=phone.replace(/\D/g,'');
    if(!cleanPhone.startsWith('57'))cleanPhone='57'+cleanPhone;
    const hashedPhone=await sha256(cleanPhone);
    const hashedName=await sha256(name.toLowerCase().trim());
    const hashedCountry=await sha256('co');
    if(typeof fbq!=='undefined'){
      fbq('init','1284056950349379',{ph:hashedPhone,fn:hashedName,country:hashedCountry});
      fbq('track','Purchase',{currency:'COP',value:total});
    }
  }catch(e){console.error('fbq advanced match error:',e);}
  window.location.href='/gracias.html';
}

// close on backdrop
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('modal').addEventListener('click',function(e){
    if(e.target===this)closeModal();
  });
});
</script>
