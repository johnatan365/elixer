<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#F5A623;
  --orange-dark:#D4891A;
  --orange-deeper:#B8740F;
  --orange-light:#FFD07A;
  --orange-pale:#FFF3D6;
  --green:#2E7D32;
  --text-dark:#1A1200;
  --text-mid:#5C4000;
  --text-soft:#8B6914;
  --wa:#25D366;--wa-dark:#1da851;
  --white:#ffffff;
  --bg:#FFFDF5;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  font-family:'Georgia',serif;
  color:var(--text-dark);
  overflow-x:hidden;
  padding-bottom:80px;
}

/* ── IMAGES ── */
.img-block{width:100%;display:flex;flex-direction:column;align-items:center;}
.img-block img{width:100%;max-width:600px;display:block;margin:0 auto;}

/* ── CTA ── */
.cta-block{width:100%;max-width:600px;margin:0 auto;padding:16px 16px 24px;}
.btn-cta-main{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:20px;border:none;border-radius:8px;cursor:pointer;
  font-size:16px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  font-family:'Georgia',serif;text-decoration:none;transition:transform .2s,box-shadow .2s;
}
.btn-orange-cta{
  background:linear-gradient(135deg,var(--orange),var(--orange-dark)) !important;
  border:2px solid var(--orange-deeper) !important;
  color:#fff !important;
  box-shadow:0 4px 20px rgba(245,166,35,.35);
}
.btn-orange-cta:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 28px rgba(245,166,35,.55);
}

/* ── DIVIDER ── */
.divider{
  width:100%;max-width:600px;margin:0 auto;height:1px;
  background:linear-gradient(90deg,transparent,var(--orange-light),transparent);
}

/* ── STICKY FOOTER ── */
.sticky{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,253,245,.97);
  border-top:1.5px solid var(--orange-light);
  padding:12px 16px;display:flex;justify-content:center;
  backdrop-filter:blur(8px);
}
.sticky a{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--wa),var(--wa-dark));
  color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;text-decoration:none;
  padding:14px 28px;border-radius:6px;width:100%;max-width:560px;
}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,0,.55);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--bg);
  width:100%;max-width:600px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;padding:0 0 32px;
  border-top:3px solid var(--orange);
}
.modal-handle{width:40px;height:4px;background:var(--orange-light);border-radius:4px;margin:12px auto 0;}
.modal-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:700;color:var(--orange-deeper);font-family:'Georgia',serif;letter-spacing:.5px;}
.modal-close{
  background:var(--orange-pale);border:1px solid var(--orange-light);
  color:var(--text-mid);width:32px;height:32px;border-radius:999px;
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* step indicator */
.steps-bar{display:flex;gap:8px;margin-bottom:20px;}
.step-dot{flex:1;height:3px;border-radius:4px;background:var(--orange-light);transition:background .3s;}
.step-dot.active{background:var(--orange);}

/* pack cards */
.pack-cards{display:flex;flex-direction:column;gap:12px;}
.pack-card{
  border:1.5px solid var(--orange-light);border-radius:12px;padding:16px;cursor:pointer;
  background:var(--white);
  transition:border-color .2s,background .2s,box-shadow .2s;position:relative;
}
.pack-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(245,166,35,.2);}
.pack-card.selected{border-color:var(--orange);background:rgba(255,243,214,.3);box-shadow:0 4px 20px rgba(245,166,35,.25);}
.pack-badge{
  position:absolute;top:-10px;right:12px;
  background:var(--orange);color:#fff;
  font-size:10px;font-weight:700;letter-spacing:1px;
  padding:3px 10px;border-radius:20px;text-transform:uppercase;
  font-family:'Georgia',serif;
}
.pack-name{font-size:15px;font-weight:700;color:var(--text-dark);margin-bottom:4px;font-family:'Georgia',serif;}
.pack-desc{font-size:12px;color:var(--text-soft);margin-bottom:8px;}
.pack-price{font-size:22px;font-weight:700;color:var(--orange-dark);font-family:'Georgia',serif;}
.pack-envio{font-size:11px;color:#2E7D32;font-weight:700;margin-top:2px;}
.pack-check{
  position:absolute;top:16px;right:16px;width:24px;height:24px;
  border:1.5px solid var(--orange-light);border-radius:999px;
  display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;
}
.pack-card.selected .pack-check{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:900;}
.pack-img-wrap{display:flex;align-items:center;justify-content:center;gap:4px;height:80px;overflow:hidden;margin-bottom:10px;}
.pack-img-wrap img{height:100%;width:auto;object-fit:contain;}

/* addon cards */
.addon-cards{display:flex;flex-direction:column;gap:10px;}
.addon-card{
  display:flex;gap:12px;align-items:center;
  border:1.5px solid var(--orange-light);border-radius:12px;
  padding:12px;cursor:pointer;background:var(--white);
  transition:border-color .2s,background .2s;
}
.addon-card:hover{border-color:var(--orange);background:rgba(255,243,214,.15);}
.addon-card.selected{border-color:var(--orange);background:rgba(255,243,214,.3);}
.addon-img{width:60px;height:60px;object-fit:contain;border-radius:8px;flex-shrink:0;background:var(--bg);}
.addon-info{flex:1;}
.addon-name{font-size:13px;font-weight:700;color:var(--text-dark);font-family:'Georgia',serif;}
.addon-why{font-size:11px;color:var(--text-soft);margin-top:2px;line-height:1.4;}
.addon-price{font-size:14px;font-weight:700;color:var(--orange-dark);margin-top:4px;}
.addon-chk{
  width:26px;height:26px;border:1.5px solid var(--orange-light);border-radius:999px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .2s;font-size:14px;
}
.addon-card.selected .addon-chk{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:900;}

/* form */
.form-lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);margin-bottom:6px;margin-top:14px;}
.form-inp{
  width:100%;background:var(--white);border:1.5px solid var(--orange-light);border-radius:8px;
  padding:12px 14px;font-size:14px;color:var(--text-dark);font-family:'Georgia',serif;outline:none;
  transition:border-color .2s;
}
.form-inp:focus{border-color:var(--orange);}
.order-summary{
  background:var(--white);border:1.5px solid var(--orange-pale);
  border-radius:10px;padding:14px;margin:16px 0;
}
.os-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);margin-bottom:10px;}
.os-line{display:flex;justify-content:space-between;font-size:13px;color:var(--text-mid);margin-bottom:6px;}
.os-total{
  display:flex;justify-content:space-between;font-size:16px;font-weight:700;
  color:var(--orange-dark);border-top:1px solid var(--orange-light);
  padding-top:10px;margin-top:6px;font-family:'Georgia',serif;
}
.btn-submit{
  width:100%;padding:18px;
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  border:none;color:#fff;font-size:16px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;border-radius:8px;cursor:pointer;
  font-family:'Georgia',serif;margin-top:16px;transition:all .2s;
}
.btn-submit:hover{transform:translateY(-2px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.form-err{color:#c0392b;font-size:12px;margin-top:8px;display:none;}
.modal-nav{display:flex;gap:10px;margin-top:16px;}
.btn-back{
  flex:1;padding:14px;background:var(--orange-pale);
  border:1px solid var(--orange-light);color:var(--text-mid);
  font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;font-family:'Georgia',serif;
}
.btn-next{
  flex:2;padding:14px;background:var(--orange);border:none;color:#fff;
  font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;
  font-family:'Georgia',serif;transition:all .2s;
}
.btn-next:hover{background:var(--orange-dark);}
.btn-next:disabled{opacity:.5;cursor:not-allowed;}

/* floating cta */
.floating-cta{
  position:fixed;left:50%;margin-left:-47.5px;bottom:22px;z-index:9999;
  width:95px;height:95px;border-radius:999px;border:none;cursor:pointer;
  background:linear-gradient(145deg,var(--orange-light),var(--orange),var(--orange-dark));
  box-shadow:0 0 0 4px rgba(245,166,35,.18),0 0 25px rgba(245,166,35,.5),0 10px 30px rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;line-height:1.15;text-align:center;
  color:#fff;padding:10px;font-family:'Georgia',serif;
  animation:floatPulse 2.6s ease-in-out infinite;
  transition:.25s ease;letter-spacing:.5px;
}
.floating-cta:hover{scale:1.08;}
@keyframes floatPulse{0%{transform:translateY(0px);}50%{transform:translateY(-8px);}100%{transform:translateY(0px);}}
</style>

<script>
const {createClient}=supabase;
const sb=createClient('https://jtjnzdbgelezdcdpipmv.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0am56ZGJnZWxlemRjZHBpcG12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MjAyODAsImV4cCI6MjA5MjM5NjI4MH0.nOqPWAjnX9nCYveL4zOjFKugdcSL0zOeWsDdr8X9rME');

const packs=[
  {id:'bomba1',name:'Bomba de Frutas 500g',desc:'1 Repolarizador Capilar 500g',price:73500,badge:''},
  {id:'kit_frutas',name:'Kit Frutas + Shampoo',desc:'Bomba de Frutas 500g + Shampoo Bomba de Frutas 500g',price:110500,badge:'Más popular'},
  {id:'kit_magico',name:'Kit Mágico',desc:'Bomba de Frutas + Shampoo + Proteína Capilar 500g',price:157000,badge:'Mejor valor'},
];
const addonsData=[
  {id:'termico',name:'Gorro Térmico',why:'Potencia el tratamiento 3x con calor controlado',price:29500,img:'/promos/landing-aminoacidos-shampoo/addon_gorro_termico.webp'},
  {id:'satin',name:'Gorro de Satín',why:'Protege el cabello mientras duermes',price:10000,img:'/promos/landing-aminoacidos-shampoo/addon_gorro_satin.webp'},
  {id:'cepillo',name:'Cepillo Secador de Aguacate',why:'Seca y modela sellando el tratamiento en minutos',price:45000,img:'/promos/landing-aminoacidos-shampoo/addon_cepillo.webp'},
];
let selectedPack=null,selectedAddons={},currentStep=1,submitting=false;

function openModal(){
  selectedPack=null;selectedAddons={};currentStep=1;
  renderStep();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
  const fb=document.querySelector('.floating-cta');
  if(fb)fb.style.display='none';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
  const fb=document.querySelector('.floating-cta');
  if(fb)fb.style.display='flex';
}
function renderStep(){
  const body=document.getElementById('modal-body');
  updateStepBar();
  if(currentStep===1)body.innerHTML=renderStep1();
  if(currentStep===2)body.innerHTML=renderStep2();
  if(currentStep===3)body.innerHTML=renderStep3();
}
function updateStepBar(){
  document.querySelectorAll('.step-dot').forEach((d,i)=>{d.classList.toggle('active',i<currentStep);});
  const titles=['Elige tu paquete','Complementos opcionales','Datos de entrega'];
  document.getElementById('modal-title').textContent=titles[currentStep-1];
}
function renderStep1(){
  const packImgs={
    bomba1:['/promos/landing-bomba-frutas/1.webp'],
    kit_frutas:['/promos/landing-bomba-frutas/1.webp','/promos/landing-aminoacidos-shampoo/addon_gorro_termico.webp'],
    kit_magico:['/promos/landing-bomba-frutas/1.webp','/Envase Aminoacido 500 gr sin fondo.webp']
  };
  return `<div class="pack-cards" style="padding:0 20px;">${packs.map(p=>`
    <div class="pack-card${selectedPack===p.id?' selected':''}" onclick="selectPack('${p.id}')">
      ${p.badge?`<div class="pack-badge">${p.badge}</div>`:''}
      <div class="pack-check">${selectedPack===p.id?'✓':''}</div>
      <div class="pack-name">${p.name}</div>
      <div class="pack-desc">${p.desc}</div>
      <div class="pack-price">$${p.price.toLocaleString('es-CO')}</div>
      <div class="pack-envio">✓ Envío gratis a toda Colombia • Pago contraentrega</div>
    </div>`).join('')}
  </div>
  <div class="modal-nav" style="padding:0 20px;">
    <button class="btn-next" onclick="goStep2()" ${!selectedPack?'disabled':''} style="flex:1;">Continuar →</button>
  </div>`;
}
function selectPack(id){selectedPack=id;renderStep();}
function goStep2(){if(!selectedPack)return;currentStep=2;renderStep();}
function renderStep2(){
  return `
  <div style="background:rgba(255,243,214,.4);border:1.5px solid var(--orange-light);border-radius:10px;padding:14px;margin:0 20px 16px;text-align:center;">
    <div style="font-size:15px;margin-bottom:6px;">🍊</div>
    <div style="font-size:14px;font-weight:700;color:var(--orange-deeper);margin-bottom:4px;font-family:'Georgia',serif;">¡Potencia tus resultados al máximo!</div>
    <div style="font-size:12px;color:var(--text-soft);line-height:1.6;">El <strong style="color:var(--text-dark);">Gorro Térmico</strong> activa el tratamiento con calor, el <strong style="color:var(--text-dark);">Gorro de Satín</strong> protege mientras duermes y el <strong style="color:var(--text-dark);">Cepillo de Aguacate</strong> sella con acabado profesional.</div>
  </div>
  <div class="addon-cards" style="padding:0 20px;">${addonsData.map(a=>`
    <div class="addon-card${selectedAddons[a.id]?' selected':''}" onclick="toggleAddon('${a.id}')">
      <img class="addon-img" src="${a.img}" alt="${a.name}"/>
      <div class="addon-info">
        <div class="addon-name">${a.name}</div>
        <div class="addon-why">${a.why}</div>
        <div class="addon-price">+ $${a.price.toLocaleString('es-CO')}</div>
      </div>
      <div class="addon-chk">${selectedAddons[a.id]?'✓':''}</div>
    </div>`).join('')}
  </div>
  <div class="modal-nav" style="padding:0 20px;">
    <button class="btn-back" onclick="goBack()">← Atrás</button>
    <button class="btn-next" onclick="goStep3()">Continuar →</button>
  </div>`;
}
function toggleAddon(id){selectedAddons[id]=!selectedAddons[id];renderStep();}
function goStep3(){currentStep=3;renderStep();}
function goBack(){currentStep--;renderStep();}
function renderStep3(){
  const pack=packs.find(p=>p.id===selectedPack);
  let total=pack.price;
  let lines=`<div class="os-line"><span>${pack.name}</span><span>$${pack.price.toLocaleString('es-CO')}</span></div>`;
  addonsData.forEach(a=>{if(selectedAddons[a.id]){total+=a.price;lines+=`<div class="os-line"><span>${a.name}</span><span>+$${a.price.toLocaleString('es-CO')}</span></div>`;}});
  return `
  <div class="order-summary" style="margin:16px 20px;">
    <div class="os-title">Resumen de tu pedido</div>
    ${lines}
    <div class="os-total"><span>Total contraentrega</span><span>$${total.toLocaleString('es-CO')}</span></div>
  </div>
  <div style="padding:0 20px;">
  <label class="form-lbl">Nombre completo *</label>
  <input id="f-name" class="form-inp" type="text" placeholder="Tu nombre y apellido"/>
  <label class="form-lbl">Teléfono / WhatsApp *</label>
  <input id="f-phone" class="form-inp" type="tel" placeholder="3XX XXX XXXX"/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div><label class="form-lbl">Ciudad *</label><input id="f-city" class="form-inp" type="text" placeholder="Tu ciudad"/></div>
    <div><label class="form-lbl">Departamento *</label><input id="f-depto" class="form-inp" type="text" placeholder="Antioquia"/></div>
  </div>
  <label class="form-lbl">Dirección de entrega *</label>
  <input id="f-address" class="form-inp" type="text" placeholder="Calle, barrio, número de casa..."/>
  <label class="form-lbl">Nota (opcional)</label>
  <input id="f-note" class="form-inp" type="text" placeholder="Instrucciones especiales..."/>
  <div class="form-err" id="form-err">Por favor completa todos los campos obligatorios.</div>
  <div class="modal-nav">
    <button class="btn-back" onclick="goBack()">← Atrás</button>
    <button class="btn-next btn-submit" id="btn-submit" onclick="submitOrder()">Confirmar pedido</button>
  </div>
  </div>`;
}

async function submitOrder(){
  if(submitting)return;
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const city=document.getElementById('f-city').value.trim();
  const depto=document.getElementById('f-depto').value.trim();
  const address=document.getElementById('f-address').value.trim();
  const note=document.getElementById('f-note')?.value.trim()||'';
  const err=document.getElementById('form-err');
  if(!name||!phone||!city||!depto||!address){err.style.display='block';return;}
  err.style.display='none';
  const pack=packs.find(p=>p.id===selectedPack);
  let total=pack.price;
  const products=[{name:pack.name,qty:1,price:pack.price}];
  addonsData.forEach(a=>{if(selectedAddons[a.id]){total+=a.price;products.push({name:a.name,qty:1,price:a.price});}});
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='Enviando...';
  submitting=true;
  const {error}=await sb.from('orders').insert([{
    customer_name:name,customer_phone:phone,
    customer_city:city+', '+depto,customer_address:address,
    products:products,total_cop:total,status:'pendiente',notes:note||null
  }]);
  submitting=false;
  if(error){
    btn.disabled=false;btn.textContent='Confirmar pedido';
    err.textContent='Error: '+(error.message||'Intenta de nuevo.');
    err.style.display='block';return;
  }
  // Coincidencias avanzadas — hashear datos para Meta
  async function sha256(str){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  try{
    let cleanPhone=phone.replace(/\D/g,'');
    if(!cleanPhone.startsWith('57'))cleanPhone='57'+cleanPhone;
    const hashedPhone=await sha256(cleanPhone);
    const hashedName=await sha256(name.toLowerCase().trim());
    const hashedCountry=await sha256('co');
    if(typeof fbq!=='undefined'){
      fbq('init','1284056950349379',{ph:hashedPhone,fn:hashedName,country:hashedCountry});
      fbq('track','Purchase',{currency:'COP',value:total});
    }
  }catch(e){console.error('fbq error:',e);}
  window.location.href='/gracias.html';
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
});
</script>
